<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Projects | Jann Nathaniel Jaravata</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=3.2.2" />
  <script>
    (function () {
      const validThemes = ["blue", "light"];
      let selectedTheme = "light";
      try {
        const savedTheme = localStorage.getItem("designlab-theme");
        if (validThemes.includes(savedTheme)) selectedTheme = savedTheme;
      } catch (error) {}
      document.documentElement.dataset.theme = selectedTheme;
    })();
  </script>
</head>
<body class="signal-theme unified-page">
  <header class="site-header signal-header unified-header">
    <a href="index.html" class="brand">
      <span class="brand-mark">DL</span>
      <span>
        <strong>Jann Nathaniel</strong>
        <small>All Portfolio Projects</small>
      </span>
    </a>

    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="insights.html">Insights</a>
      <a href="contact.html?source=projects-navigation">Contact</a>
    </nav>
  </header>

  <main class="projects-page section-pad">
    <section class="projects-page-hero">
      <p class="eyebrow">Portfolio Archive</p>
      <h1>All Projects</h1>
      <p class="project-detail-copy">Browse work across campaigns, branding, social media, publications, and digital systems.</p>
    </section>

    <section class="filter-shell">
      <div class="filter-tabs" id="filterTabs">
        <button class="active" data-filter="All">All</button>
        <button data-filter="Social Media">Social Media</button>
        <button data-filter="Branding">Branding</button>
        <button data-filter="Web / Digital">Web / Digital</button>
        <button data-filter="Print & Publications">Print & Publications</button>
        <button data-filter="DesignLab">DesignLab</button>
        <button data-filter="University">University</button>
        <button data-filter="Client Work">Client Work</button>
      </div>
    </section>

    <section>
      <div id="allProjectGrid" class="project-grid">
        <div class="loading-card">Loading projects...</div>
      </div>
    </section>
  </main>

  <div class="theme-dock" aria-label="Portfolio appearance">
    <div class="theme-switcher" role="group" aria-label="Choose website theme">
      
      <button type="button" data-theme-choice="blue" aria-label="Use Blue Mode" title="Blue Mode">
        <span class="theme-swatch theme-swatch-blue"></span>
        <span>Blue</span>
      </button>
      <button type="button" data-theme-choice="light" aria-label="Use Light Mode" title="Light Mode">
        <span class="theme-swatch theme-swatch-light"></span>
        <span>Light</span>
      </button>
    </div>
  </div>

  <footer class="footer unified-footer">
    <p>© <span id="year"></span> Jann Nathaniel Jaravata / DesignLab Creative Studio</p>
    <p class="footer-meta">Version <span id="siteVersion"></span> · Last edit: <span id="lastEdit"></span></p>
  </footer>

  <script src="config.js?v=3.2.2"></script>
  <script src="theme.js?v=3.2.2"></script>
  <script src="projects.js?v=3.2.2"></script>
<script src="navigation.js?v=3.2.2"></script><script src="reveal.js?v=3.2.2"></script></body>
</html>
